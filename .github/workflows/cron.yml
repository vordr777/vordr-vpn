name: Auto Multi-File Updater

on:
  push:
  schedule:
    - cron: '*/5 * * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
      
      - name: Run Update Script
        run: |
          python3 -c "
          import re
          import os
          
          bytes_to_add = 5937792
          files_to_update = ['Gogo', 'Islamclk', 'Vordr.txt']
          
          def replacer(match):
              current_val = float(match.group(1))
              return f'download={int(current_val + bytes_to_add)}'
          
          for filename in files_to_update:
              if os.path.exists(filename):
                  with open(filename, 'r') as f:
                      data = f.read()
                  new_data = re.sub(r'download=([0-9.]+)', replacer, data)
                  with open(filename, 'w') as f:
                      f.write(new_data)
          "
          
          git config --global user.name 'github-actions[bot]'
          git config --global user.email 'github-actions[bot]@users.noreply.github.com'
          git add Gogo Islamclk Vordr.txt
          git commit -m "Otomatik güncelleme: 3 dosya +6.38 MB"
          git push
